name: pr-run-tests-prerequisite

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Installs the dependencies listed in requirements.txt
          pip install -r requirements.txt

      - name: Run Pytest
        env:
          # Pulls the testing database string from your GitHub Repository Secrets
          TESTING_DATABASE_URL: ${{ secrets.TESTING_DATABASE_URL }}
        run: |
          pytest tests/ -v
