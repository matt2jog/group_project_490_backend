name: pr-run-tests-prerequisite

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          uv sync --frozen

      - name: Run Pytest
        env:
          # Pulls the testing database string from your GitHub Repository Secrets
          TESTING_DATABASE_URL: ${{ secrets.TESTING_DATABASE_URL }}
          TESTING_SUPABASE_URL: ${{ secrets.TESTING_SUPABASE_URL}}
          TESTING_SUPABASE_SERVICE_KEY: ${{ secrets.TESTING_SUPABASE_SERVICE_KEY }}
          IS_TESTING: "True"
        run: |
          uv run pytest tests/ -v
